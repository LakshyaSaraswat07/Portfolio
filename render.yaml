services:
  - type: web
    name: lakshya-saraswat-portfolio-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://lakshya-saraswat-portfolio.onrender.com
      - key: MONGO_URI
        sync: false
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_PORT
        value: 587
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: EMAIL_TO
        value: lakshya3924@gmail.com

  - type: web
    name: lakshya-saraswat-portfolio
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    autoDeployTrigger: commit
    envVars:
      - key: VITE_API_URL
        value: https://lakshya-saraswat-portfolio-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
