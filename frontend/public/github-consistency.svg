<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 360" role="img" aria-labelledby="title desc">
  <title id="title">GitHub consistency and contribution visualization</title>
  <desc id="desc">A premium dark contribution graph with streak and consistency indicators.</desc>
  <defs>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="1">
      <stop stop-color="#00F5FF"/>
      <stop offset=".55" stop-color="#7B61FF"/>
      <stop offset="1" stop-color="#FF4D8D"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
