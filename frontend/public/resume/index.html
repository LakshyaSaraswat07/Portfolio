<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow, noarchive" />
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate" />
    <title>Lakshya Saraswat | Resume</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #08090d;
        color: #f7fbff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        background:
          radial-gradient(circle at 15% 10%, rgba(0, 245, 255, 0.12), transparent 30%),
          radial-gradient(circle at 88% 18%, rgba(123, 97, 255, 0.14), transparent 28%),
          #08090d;
        user-select: none;
        -webkit-user-select: none;
      }

      header {
        position: sticky;
        top: 0;
        z-index: 2;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 14px max(18px, calc((100vw - 980px) / 2));
        border-bottom: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(8, 9, 13, 0.9);
        backdrop-filter: blur(18px);
      }

      header strong {
        font-size: 1rem;
      }

      header a {
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 8px;
        padding: 9px 12px;
        color: #00f5ff;
        text-decoration: none;
        font-size: 0.86rem;
        font-weight: 800;
      }

      main {
        width: min(940px, calc(100% - 24px));
        margin: 0 auto;
        padding: 24px 0 48px;
      }

      .viewer {
        position: relative;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 8px;
        background: #fff;
        box-shadow: 0 30px 90px rgba(0, 0, 0, 0.45);
      }

      canvas {
        display: block;
        width: 100%;
        height: auto;
        pointer-events: none;
      }

      .shield {
        position: absolute;
        inset: 0;
        z-index: 1;
      }

      @media print {
        body {
          display: none !important;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <strong>Lakshya Saraswat | Resume</strong>
      <a href="/">Back to Portfolio</a>
    </header>
    <main>
      <div class="viewer" aria-label="Lakshya Saraswat resume viewer">
        <canvas id="resume" role="img" aria-label="Lakshya Saraswat resume"></canvas>
        <div class="shield" aria-hidden="true"></div>
      </div>
    </main>
    <script>
      const canvas = document.querySelector("#resume");
      const context = canvas.getContext("2d", { alpha: false });
      const page = new Image();

      page.onload = () => {
        canvas.width = page.naturalWidth;
        canvas.height = page.naturalHeight;
        context.fillStyle = "#ffffff";
        context.fillRect(0, 0, canvas.width, canvas.height);
        context.drawImage(page, 0, 0);
      };

      page.src = "/resume/resume-page.jpg";

      document.addEventListener("contextmenu", (event) => event.preventDefault());
      document.addEventListener("dragstart", (event) => event.preventDefault());
      document.addEventListener("keydown", (event) => {
        const protectedShortcut = (event.ctrlKey || event.metaKey) && ["s", "p", "u"].includes(event.key.toLowerCase());
        if (protectedShortcut || event.key === "PrintScreen") {
          event.preventDefault();
        }
      });
    </script>
  </body>
</html>
